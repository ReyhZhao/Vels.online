services:
  valkey:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vels_online
      POSTGRES_USER: vels
      POSTGRES_PASSWORD: vels_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vels -d vels_online"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    platform: linux/amd64
    build: ./backend
    image: backend:latest
    command: >
      sh -c "python manage.py migrate &&
             (python manage.py createsuperuser --noinput || true) &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Docker-internal hostnames override the .env defaults
      DATABASE_URL: postgres://vels:vels_password@db:5432/vels_online
      REDIS_URL: redis://valkey:6379/0
      # Local-dev only — not in .env
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@localhost
      DJANGO_SUPERUSER_PASSWORD: admin
      # Local-dev only: auto-authenticate every request as the admin superuser
      # so no login is needed. Never set this in deployment/ (Helm) manifests.
      DEV_AUTO_LOGIN: "True"
      # Disable OIDC locally; override the placeholder value in .env
      AUTHENTIK_SERVER_URL: ""
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # OTA update server for the React Native staff app: serves the exported Expo
  # update bundle (iOS + Android Hermes bundles + metadata.json), same image as
  # CI builds. Day-to-day mobile dev runs Metro on the host (`cd mobile && npm
  # start`) — this container is for verifying the shipped bundle.
  mobile:
    platform: linux/amd64
    image: mobile:latest
    build: ./mobile
    ports:
      - "8090:80"

  frontend:
    platform: linux/amd64
    image: frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_LOGIN_URL: /auth/login/
      # Presence: exclude yourself from the incident presence banner / task strip.
      # Default off so a single dev user can see presence; set to "1" for prod behaviour.
      VITE_PRESENCE_SELF_EXCLUSION: "0"
    depends_on:
      - backend

volumes:
  postgres_data:
