server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # The k8s Ingress routes the update server under /mobile-updates/ without
    # rewriting; strip the prefix internally so both bases serve the bundle.
    location /mobile-updates/ {
        rewrite ^/mobile-updates/(.*)$ /$1 last;
    }

    # The update manifest must always be revalidated so devices see new releases.
    location = /metadata.json {
        add_header Cache-Control "no-cache";
    }

    # Content-addressed bundles are immutable.
    location /_expo/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri =404;
    }
}
