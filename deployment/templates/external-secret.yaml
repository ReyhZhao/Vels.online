---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: valkey-secret
spec:
  refreshInterval: "120s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: valkey-secret
    creationPolicy: Owner
  data:
    - secretKey: valkey-password
      remoteRef:
        key: kv/velsonline
        property: VALKEY_PASSWORD

---

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: secret-provider-class-acr
  namespace: {{ .Release.Namespace }}
spec:
  provider: vault
  secretObjects:
    - data:
        - key: .dockerconfigjson
          objectName: .dockerconfigjson
      secretName: azure-acr
      type: kubernetes.io/dockerconfigjson
  parameters:
    vaultAddress: {{ .Values.vaultAddress }}
    vaultKubernetesMountPath: "kubernetes/{{ .Values.clusterName }}"
    roleName: "azure_devops_agent_acr"
    objects: |
      - objectName: ".dockerconfigjson"
        secretPath: "secret/devops/agents/acr"
        secretKey: ".dockerconfigjson"
