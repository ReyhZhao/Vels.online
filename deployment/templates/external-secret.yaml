---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secret
spec:
  refreshInterval: "120s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: backend-secret
    creationPolicy: Owner

  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: kv/velsonline
        property: SECRET_KEY