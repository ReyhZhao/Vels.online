apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      initContainers:
        - name: migrate
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - secretRef:
                name: backend-secret

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cluster-velsonline-app
                  key: fqdn-uri
            - name: ALLOWED_HOSTS
              value: "vels.online"
            - name: DEBUG
              value: "False"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://vels.online"

      containers:
        - name: backend
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cluster-velsonline-app
                  key: fqdn-uri

            - name: ALLOWED_HOSTS
              value: "vels.online"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://vels.online"
            - name: DEBUG
              value: "False"

