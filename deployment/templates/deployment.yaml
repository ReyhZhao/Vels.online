apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  annotations:
    configmap.reloader.stakater.com/reload: "backend-config"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      resources:
        requests:
          memory: "512Mi"
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      initContainers:
        - name: migrate
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: backend-config

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cluster-velsonline-app
                  key: fqdn-uri

            - name: CSRF_TRUSTED_ORIGINS
              value: "https://vels.online"

      containers:
        - name: backend
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: backend-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cluster-velsonline-app
                  key: fqdn-uri

            - name: CSRF_TRUSTED_ORIGINS
              value: "https://vels.online"
            - name: DEBUG
              value: "True"
            {{- if .Values.monitoring.enabled }}
            # gunicorn runs multiple workers; prometheus_client multiprocess mode
            # writes per-process samples here for the metrics sidecar to aggregate
            # (ADR-0019). Deliberately not exposed on the Ingress-routed port 8000.
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /tmp/prometheus-multiproc
          volumeMounts:
            - name: prometheus-multiproc
              mountPath: /tmp/prometheus-multiproc
        # Aggregating metrics endpoint on a dedicated port the public Ingress never
        # routes to; only the in-cluster Prometheus scraper reaches it.
        - name: metrics-exporter
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: Always
          command: ["python", "metrics_exporter.py"]
          ports:
            - name: metrics
              containerPort: {{ .Values.monitoring.metricsPort }}
          env:
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /tmp/prometheus-multiproc
            - name: METRICS_PORT
              value: {{ .Values.monitoring.metricsPort | quote }}
          volumeMounts:
            - name: prometheus-multiproc
              mountPath: /tmp/prometheus-multiproc
      volumes:
        - name: prometheus-multiproc
          emptyDir: {}
            {{- end }}
