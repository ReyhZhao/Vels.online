apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  EMAIL_SSL_NO_VERIFY: "True"
  BUNKERWEB_PUBLIC_FQDN: proxy.vels.online
  SEMAPHORE_PROJECT_ID: "1"
  AUTHENTIK_ENROLLMENT_FLOW_SLUG: default-enrollment-flow

  OLLAMA_MODEL: gemma4:31b-cloud
  INBOUND_IMAP_HOST: mail.vels.online
  ONCALL_ROUTING: llm_guided
  ALLOWED_HOSTS: "vels.online,backend.velsonline.svc.cluster.local"

  EXCEPTION_LLM_PROVIDER: incidents.llm.ollama.OllamaTriageProvider
  TRIAGE_LLM_PROVIDER: incidents.llm.ollama.OllamaTriageProvider
  CORRELATION_LLM_PROVIDER: incidents.llm.ollama.OllamaTriageProvider
  CLOSURE_LLM_PROVIDER: incidents.llm.ollama.OllamaTriageProvider
  INCIDENT_ASSISTANT_LLM_PROVIDER: incidents.llm.ollama.OllamaTriageProvider