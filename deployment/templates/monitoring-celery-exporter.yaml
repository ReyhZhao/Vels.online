{{- if .Values.monitoring.enabled }}
# Off-the-shelf celery-exporter (ADR-0019): consumes task events from the Valkey
# broker and exposes throughput/failure/retry/queue-depth metrics. No worker-side
# instrumentation — the workers just emit task events (CELERY_*_SEND_*_EVENT settings).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-exporter
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: celery-exporter
  template:
    metadata:
      labels:
        app: celery-exporter
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: celery-exporter
          image: {{ .Values.monitoring.celeryExporter.image }}
          ports:
            - name: metrics
              containerPort: {{ .Values.monitoring.celeryExporter.port }}
          env:
            # The exporter reads the same broker the app uses; CE_* is its config prefix.
            - name: CE_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: REDIS_URL
            - name: CE_PORT
              value: {{ .Values.monitoring.celeryExporter.port | quote }}
          resources:
            requests:
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: celery-exporter
  labels:
    app: celery-exporter
    {{- toYaml .Values.monitoring.selectorLabels | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: celery-exporter
  ports:
    - name: metrics
      port: {{ .Values.monitoring.celeryExporter.port }}
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: celery-exporter
  labels:
    {{- toYaml .Values.monitoring.selectorLabels | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: celery-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
{{- end }}
