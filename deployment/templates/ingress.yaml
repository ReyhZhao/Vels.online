apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vels-online
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: bunkerweb
  tls:
    - hosts:
        - vels.online
      secretName: vels-online-tls

  rules:
    - host: vels.online
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /auth/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
